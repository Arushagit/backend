version: '3.9'

services:
  # ─── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: crm_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: crm_db
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Django Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override MongoDB URI for Docker network
      MONGODB_URI: mongodb://mongodb:27017/crm_db
      DEBUG: "False"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles

volumes:
  mongodb_data:
    driver: local
  static_files:
    driver: local
